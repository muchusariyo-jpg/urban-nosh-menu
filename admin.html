<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Nosh — Menu Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  /* Admin-only additions — kept separate from the customer-facing style.css */
  body{padding-bottom:100px;}
  .admin-header{
    background:var(--olive-deep); color:var(--paper); padding:22px 20px; text-align:center;
  }
  .admin-header h1{font-family:var(--font-display); margin:0 0 4px; font-size:1.5rem;}
  .admin-header p{margin:0; font-size:.82rem; opacity:.85;}
  .admin-toolbar{
    position:sticky; top:0; z-index:80; background:var(--paper); border-bottom:1px solid var(--line);
    padding:12px 16px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;
  }
  .admin-btn{
    font-size:.8rem; font-weight:700; border-radius:999px; padding:9px 16px; border:1.5px solid var(--line);
    background:transparent; color:var(--coffee); white-space:nowrap;
  }
  .admin-btn.primary{background:var(--rust); border-color:var(--rust); color:var(--paper);}
  .admin-btn.secondary{background:var(--olive-deep); border-color:var(--olive-deep); color:var(--paper);}
  .admin-search{flex:1; min-width:140px; padding:9px 14px; border-radius:999px; border:1.5px solid var(--line); font-size:.85rem;}
  #fileInput{display:none;}

  .banner{
    margin:14px 20px; padding:12px 16px; border-radius:10px; font-size:.82rem; line-height:1.5;
    background:rgba(201,138,46,0.15); border-left:3px solid var(--gold); color:var(--coffee-soft);
  }
  .banner.error{background:rgba(176,80,31,0.15); border-left-color:var(--rust);}
  .banner.success{background:rgba(75,90,52,0.15); border-left-color:var(--olive);}

  .admin-list{padding:6px 20px 40px; max-width:720px; margin:0 auto;}
  .admin-cat-group{margin-bottom:8px;}
  .admin-cat-header{
    font-family:var(--font-display); font-weight:700; font-size:1.1rem; padding:16px 0 8px;
    border-bottom:2px solid var(--line); margin-bottom:10px;
  }

  .edit-card{
    background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:14px;
    margin-bottom:12px; box-shadow:var(--shadow-soft);
  }
  .edit-row{display:flex; gap:10px; margin-bottom:8px; flex-wrap:wrap;}
  .edit-row > *{flex:1; min-width:110px;}
  .edit-card label{font-size:.68rem; text-transform:uppercase; letter-spacing:.4px; color:var(--coffee-soft); font-weight:700; display:block; margin-bottom:3px;}
  .edit-card input[type="text"], .edit-card input[type="number"], .edit-card select, .edit-card textarea{
    width:100%; padding:8px 10px; border-radius:8px; border:1px solid var(--line); font-size:.85rem;
    font-family:var(--font-body); background:var(--cream); color:var(--coffee);
  }
  .edit-card textarea{resize:vertical; min-height:44px;}
  .toggle-row{display:flex; gap:14px; flex-wrap:wrap; margin:8px 0;}
  .toggle-row label{
    display:flex; align-items:center; gap:5px; font-size:.75rem; text-transform:none;
    letter-spacing:0; font-weight:600; color:var(--coffee); margin:0;
  }
  .toggle-row input{width:auto;}

  .photo-row{display:flex; align-items:center; gap:12px; margin-bottom:10px;}
  .photo-preview{
    width:64px; height:64px; border-radius:10px; object-fit:cover; background:var(--cream-deep);
    border:1px solid var(--line); flex:0 0 auto;
  }
  .photo-preview.empty{display:flex; align-items:center; justify-content:center; font-size:1.3rem; opacity:.5;}
  .photo-actions{display:flex; gap:8px; flex-wrap:wrap;}
  .photo-actions button{font-size:.72rem; padding:6px 12px; border-radius:999px; border:1px solid var(--line); background:transparent;}

  .card-footer{display:flex; justify-content:space-between; align-items:center; margin-top:6px;}
  .id-tag{font-size:.68rem; color:var(--coffee-soft);}
  .delete-btn{font-size:.72rem; color:var(--rust); background:none; border:none; font-weight:700;}

  .fab-save{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:var(--rust); color:var(--paper); border:none; border-radius:999px;
    padding:14px 26px; font-weight:700; font-size:.9rem; box-shadow:var(--shadow); z-index:100;
  }
</style>
</head>
<body>

<div class="admin-header">
  <h1>Urban Nosh — Menu Editor</h1>
  <p>Edit items visually, then download the updated menu.json to upload to GitHub.</p>
</div>

<div class="admin-toolbar">
  <button class="admin-btn secondary" id="loadFromSiteBtn">Load current menu</button>
  <button class="admin-btn" id="loadFromFileBtn">Upload a menu.json</button>
  <input type="file" id="fileInput" accept="application/json">
  <input type="text" class="admin-search" id="adminSearch" placeholder="Find an item…">
  <button class="admin-btn primary" id="addItemBtn">+ Add Item</button>
</div>

<div id="bannerArea"></div>

<div class="admin-list" id="adminList">
  <p style="text-align:center; color:var(--coffee-soft); padding:40px 0;">
    Click <strong>"Load current menu"</strong> above to start editing.
  </p>
</div>

<button class="fab-save" id="downloadBtn" style="display:none;">⬇ Download Updated menu.json</button>

<script src="admin.js"></script>
</body>
</html>
